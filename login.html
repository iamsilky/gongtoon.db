<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login – กองทุนฟื้นฟูสมรรถภาพ จังหวัดระยอง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Sarabun', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(30,64,175,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.14) 0%, transparent 45%),
    #0f172a;
}

.login-card {
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  padding: 2.5rem 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
}

.lock-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin: 0 auto 1.25rem;
  box-shadow: 0 4px 16px rgba(30,64,175,0.35);
}

.restricted-badge {
  display: inline-block;
  background: #fef2f2;
  color: #991b1b;
  border: 1px solid #fecaca;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 0.25rem 0.85rem;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}

.login-title {
  font-size: 1.45rem;
  font-weight: 800;
  color: #0f172a;
  text-align: center;
  margin-bottom: 0.25rem;
}

.login-subtitle {
  font-size: 0.9rem;
  color: #64748b;
  text-align: center;
  margin-bottom: 1.75rem;
}

.form-group {
  margin-bottom: 1rem;
}

label {
  display: block;
  font-size: 0.88rem;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 0.35rem;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 0.65rem 0.9rem;
  border: 1.5px solid #cbd5e1;
  border-radius: 8px;
  font-family: 'Sarabun', sans-serif;
  font-size: 1rem;
  color: #1e293b;
  background: #f8fafc;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

input[type="text"]:focus,
input[type="password"]:focus {
  border-color: #1e40af;
  box-shadow: 0 0 0 3px rgba(30,64,175,0.12);
  background: #fff;
}

.login-btn {
  width: 100%;
  padding: 0.75rem;
  background: linear-gradient(135deg, #1e40af, #2563eb);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Sarabun', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.2s, transform 0.15s;
}

.login-btn:hover { opacity: 0.92; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }

.error-msg {
  display: none;
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
  border-radius: 7px;
  padding: 0.55rem 0.85rem;
  font-size: 0.88rem;
  font-weight: 600;
  margin-top: 0.75rem;
  text-align: center;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 1.25rem;
  color: #64748b;
  font-size: 0.88rem;
  text-decoration: none;
  transition: color 0.2s;
}

.back-link:hover { color: #1e40af; }

.divider {
  height: 1px;
  background: #e2e8f0;
  margin: 1.5rem 0 1rem;
}
</style>
</head>
<body>

<div class="login-card">
  <div style="text-align:center;">
    <div class="lock-icon">🔐</div>
    <span class="restricted-badge">Authorized Personnel Only</span>
    <h1 class="login-title">Staff Login</h1>
    <p class="login-subtitle">กองทุนฟื้นฟูสมรรถภาพ จังหวัดระยอง</p>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn">Login →</button>
    <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>
  </form>

  <div class="divider"></div>
  <a href="index.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
const CREDENTIALS = { username: 'admin', password: 'rayong2024' };

function handleLogin(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');

  if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
    err.style.display = 'none';
    window.location.href = 'staff-hub.html';
  } else {
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}
</script>

</body>
</html>
